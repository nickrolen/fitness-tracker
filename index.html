<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weekly Fitness Tracker</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      padding-bottom: 80px;
    }
    
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px 15px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .header h1 {
      font-size: 1.4rem;
      margin-bottom: 5px;
    }
    
    .week-selector {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
    }
    
    .week-selector input {
      padding: 8px 12px;
      border-radius: 8px;
      border: none;
      font-size: 1rem;
      background: rgba(255,255,255,0.2);
      color: white;
    }
    
    .preset-selector {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-top: 8px;
    }
    
    .preset-btn {
      padding: 5px 10px;
      border-radius: 6px;
      border: 2px solid transparent;
      font-size: 0.72rem;
      font-weight: 600;
      cursor: pointer;
      color: white;
      background: rgba(255,255,255,0.12);
      transition: all 0.2s;
      white-space: nowrap;
    }
    
    .preset-btn.active {
      border-color: white;
    }
    
    .preset-btn[data-preset="Maintenance"] { background: rgba(96, 165, 250, 0.35); }
    .preset-btn[data-preset="Maintenance"].active { background: rgba(96, 165, 250, 0.6); border-color: #60a5fa; }
    .preset-btn[data-preset="Easy Cut"] { background: rgba(74, 222, 128, 0.3); }
    .preset-btn[data-preset="Easy Cut"].active { background: rgba(74, 222, 128, 0.5); border-color: #4ade80; }
    .preset-btn[data-preset="Regular Cut"] { background: rgba(251, 191, 36, 0.3); }
    .preset-btn[data-preset="Regular Cut"].active { background: rgba(251, 191, 36, 0.5); border-color: #fbbf24; }
    .preset-btn[data-preset="Aggressive Cut"] { background: rgba(248, 113, 113, 0.3); }
    .preset-btn[data-preset="Aggressive Cut"].active { background: rgba(248, 113, 113, 0.5); border-color: #f87171; }
    
    .week-phase-label {
      margin-top: 6px;
      text-align: center;
      font-size: 0.78rem;
      line-height: 1.3;
    }
    
    .week-phase-label .week-number {
      font-weight: 700;
      font-size: 0.82rem;
    }
    
    .week-phase-label .phase-line {
      opacity: 0.9;
      font-size: 0.72rem;
    }
    
    .phase-tag {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 4px;
      font-weight: 600;
      font-size: 0.68rem;
      margin-right: 4px;
    }
    
    .phase-tag.maintenance { background: rgba(96, 165, 250, 0.4); color: #93c5fd; }
    .phase-tag.easy-cut { background: rgba(74, 222, 128, 0.4); color: #86efac; }
    .phase-tag.regular-cut { background: rgba(251, 191, 36, 0.4); color: #fde68a; }
    .phase-tag.aggressive-cut { background: rgba(248, 113, 113, 0.4); color: #fca5a5; }
    
    .preset-auto-badge {
      font-size: 0.62rem;
      background: rgba(255,255,255,0.15);
      padding: 1px 5px;
      border-radius: 3px;
      margin-left: 4px;
      opacity: 0.7;
    }
    
    .flex-meal-editor {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 8px 15px 8px 60px;
    }
    
    .flex-meal-editor input {
      width: 70px;
      padding: 6px;
      font-size: 0.85rem;
      text-align: center;
      border: 1px solid #444;
      border-radius: 6px;
      background: #1a1a2e;
      color: #eee;
    }
    
    .flex-meal-editor input:focus {
      border-color: #667eea;
      outline: none;
    }
    
    .flex-meal-editor label {
      font-size: 0.75rem;
      color: #888;
    }
    
    .preset-meal-badge {
      font-size: 0.6rem;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 6px;
      vertical-align: middle;
    }
    
    .preset-meal-badge.easy-cut { background: rgba(74, 222, 128, 0.3); color: #86efac; }
    .preset-meal-badge.maintenance { background: rgba(96, 165, 250, 0.3); color: #93c5fd; }
    
    .tabs {
      display: flex;
      background: #16213e;
      overflow-x: auto;
      position: sticky;
      top: 0;
      z-index: 99;
    }
    
    .tab {
      flex: 1;
      min-width: 50px;
      padding: 12px 8px;
      text-align: center;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
    }
    
    .tab.active {
      background: #1a1a2e;
      border-bottom-color: #667eea;
    }
    
    .tab .day-status {
      font-size: 0.7rem;
      margin-top: 2px;
    }
    
    .content {
      padding: 15px;
    }
    
    .day-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
    }
    
    .day-header h2 {
      font-size: 1.2rem;
      margin-bottom: 5px;
    }
    
    .day-header .subtitle {
      font-size: 0.85rem;
      opacity: 0.9;
    }
    
    .day-stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 15px;
    }
    
    .stat-box {
      background: #16213e;
      padding: 12px;
      border-radius: 10px;
      text-align: center;
    }
    
    .stat-box .value {
      font-size: 1.5rem;
      font-weight: bold;
      color: #667eea;
    }
    
    .stat-box .label {
      font-size: 0.75rem;
      opacity: 0.7;
      margin-top: 2px;
    }
    
    .stat-box.good .value { color: #4ade80; }
    .stat-box.warning .value { color: #fbbf24; }
    .stat-box.bad .value { color: #f87171; }
    
    .section {
      background: #16213e;
      border-radius: 12px;
      margin-bottom: 15px;
      overflow: hidden;
    }
    
    .section-header {
      background: #0f3460;
      padding: 12px 15px;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .section-header .count {
      background: #667eea;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.8rem;
    }
    
    .item {
      display: flex;
      align-items: center;
      padding: 12px 15px;
      border-bottom: 1px solid #1a1a2e;
      gap: 12px;
    }
    
    .item:last-child {
      border-bottom: none;
    }
    
    .item-toggle {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 2px solid #444;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.2rem;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    
    .item-toggle.done {
      background: #4ade80;
      border-color: #4ade80;
    }
    
    .item-toggle.missed {
      background: #f87171;
      border-color: #f87171;
    }
    
    .item-details {
      flex: 1;
      min-width: 0;
    }
    
    .item-time {
      font-size: 0.75rem;
      color: #667eea;
      margin-bottom: 2px;
    }
    
    .item-name {
      font-size: 0.95rem;
      margin-bottom: 2px;
    }
    
    .item-meta {
      font-size: 0.8rem;
      opacity: 0.6;
    }
    
    .sleep-tracker {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px;
    }
    
    .sleep-toggle {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 2px solid #444;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.5rem;
      transition: all 0.2s;
    }
    
    .sleep-toggle.done {
      background: #4ade80;
      border-color: #4ade80;
    }
    
    .sleep-toggle.missed {
      background: #f87171;
      border-color: #f87171;
    }
    
    .notes-section textarea {
      width: 100%;
      background: #1a1a2e;
      border: none;
      padding: 12px;
      color: #eee;
      font-size: 0.95rem;
      min-height: 80px;
      resize: vertical;
      border-radius: 0 0 12px 12px;
    }
    
    .summary-tab {
      padding: 15px;
    }
    
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }
    
    .summary-card {
      background: #16213e;
      padding: 15px;
      border-radius: 12px;
      text-align: center;
    }
    
    .summary-card .value {
      font-size: 2rem;
      font-weight: bold;
      color: #667eea;
    }
    
    .summary-card .label {
      font-size: 0.85rem;
      opacity: 0.7;
      margin-top: 5px;
    }
    
    .summary-card.good .value { color: #4ade80; }
    
    .weight-input {
      background: #16213e;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 15px;
      text-align: center;
    }
    
    .weight-input label {
      display: block;
      margin-bottom: 10px;
      font-weight: 600;
    }
    
    .weight-input input {
      width: 120px;
      padding: 12px;
      font-size: 1.5rem;
      text-align: center;
      border: none;
      border-radius: 8px;
      background: #1a1a2e;
      color: #eee;
    }
    
    .week-breakdown {
      background: #16213e;
      border-radius: 12px;
      overflow: hidden;
    }
    
    .week-breakdown-header {
      background: #0f3460;
      padding: 12px 15px;
      font-weight: 600;
    }
    
    .week-day-row {
      display: flex;
      justify-content: space-between;
      padding: 12px 15px;
      border-bottom: 1px solid #1a1a2e;
    }
    
    .week-day-row:last-child {
      border-bottom: none;
    }
    
    .week-day-row .day-name {
      font-weight: 600;
    }
    
    .week-day-row .day-stats-mini {
      display: flex;
      gap: 15px;
      font-size: 0.85rem;
    }
    
    .week-day-row .day-stats-mini span {
      opacity: 0.7;
    }
    
    .reset-btn {
      display: block;
      width: 100%;
      padding: 15px;
      margin-top: 20px;
      background: #f87171;
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    
    .export-btn-group {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }
    
    .export-btn {
      flex: 1;
      padding: 12px;
      background: #0f3460;
      border: 1px solid #667eea;
      border-radius: 12px;
      color: #667eea;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .export-btn:hover {
      background: #667eea;
      color: white;
    }
    
    .overview-grid {
      background: #16213e;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 15px;
    }
    
    .overview-row {
      display: grid;
      grid-template-columns: 70px repeat(7, 1fr);
      border-bottom: 1px solid #1a1a2e;
    }
    
    .overview-row:last-child {
      border-bottom: none;
    }
    
    .overview-cell {
      padding: 8px 4px;
      text-align: center;
      font-size: 0.7rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .overview-cell.header {
      background: #0f3460;
      font-weight: 600;
      font-size: 0.75rem;
    }
    
    .overview-cell.time-col {
      background: #0f3460;
      font-size: 0.65rem;
    }
    
    .overview-cell.workout {
      background: rgba(74, 222, 128, 0.2);
    }
    
    .overview-cell.active {
      background: rgba(251, 191, 36, 0.2);
    }
    
    .mini-status {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      cursor: pointer;
    }
    
    .mini-status.done {
      background: #4ade80;
    }
    
    .mini-status.missed {
      background: #f87171;
    }
    
    .mini-status.pending {
      background: #444;
    }
    
    .weigh-in-input {
      padding: 15px;
    }
    
    .weigh-in-input input {
      width: 100%;
      padding: 12px;
      font-size: 1.2rem;
      text-align: center;
      border: none;
      border-radius: 8px;
      background: #1a1a2e;
      color: #eee;
    }
    
    .or-label {
      padding: 8px 15px;
      font-size: 0.75rem;
      color: #667eea;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      background: rgba(102, 126, 234, 0.1);
    }
    
    .or-divider {
      text-align: center;
      padding: 4px 15px;
      font-size: 0.7rem;
      color: #888;
      background: rgba(255,255,255,0.02);
    }
    
    .grouped-item {
      background: rgba(102, 126, 234, 0.05);
    }
    
    .lift-weight-input {
      flex-shrink: 0;
    }
    
    .lift-weight-input input {
      width: 70px;
      padding: 8px;
      font-size: 0.9rem;
      text-align: center;
      border: 1px solid #444;
      border-radius: 8px;
      background: #1a1a2e;
      color: #eee;
    }
    
    .lift-weight-input input:focus {
      border-color: #667eea;
      outline: none;
    }
    
    .set-log-area {
      padding: 8px 15px 12px 60px;
      border-bottom: 1px solid #1a1a2e;
      background: rgba(102, 126, 234, 0.03);
    }
    
    .set-log-header {
      display: grid;
      grid-template-columns: 38px 1fr 1fr;
      gap: 8px;
      font-size: 0.7rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
      padding: 0 2px;
    }
    
    .set-log-row {
      display: grid;
      grid-template-columns: 38px 1fr 1fr;
      gap: 8px;
      margin-bottom: 4px;
      align-items: center;
    }
    
    .set-log-row .set-label {
      font-size: 0.75rem;
      color: #667eea;
      font-weight: 600;
      text-align: center;
    }
    
    .set-log-row input {
      width: 100%;
      padding: 7px 6px;
      font-size: 0.85rem;
      text-align: center;
      border: 1px solid #333;
      border-radius: 6px;
      background: #1a1a2e;
      color: #eee;
      transition: border-color 0.2s;
    }
    
    .set-log-row input:focus {
      border-color: #667eea;
      outline: none;
    }
    
    .set-log-row input.has-value {
      border-color: #4ade8055;
    }
    
    .set-log-summary {
      font-size: 0.75rem;
      color: #888;
      padding-top: 4px;
      text-align: right;
    }
    
    .set-log-summary .top-set {
      color: #667eea;
      font-weight: 600;
    }
    
    /* Strength Progress v2 */
    .strength-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }
    
    .strength-table th {
      padding: 10px 8px;
      text-align: left;
      color: #888;
      font-weight: 600;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #333;
    }
    
    .strength-table th:not(:first-child) {
      text-align: center;
    }
    
    .strength-table td {
      padding: 10px 8px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      vertical-align: middle;
    }
    
    .strength-table td:not(:first-child) {
      text-align: center;
    }
    
    .strength-table tr:last-child td {
      border-bottom: none;
    }
    
    .strength-lift-name {
      font-weight: 600;
      color: #ddd;
    }
    
    .strength-lift-day {
      font-size: 0.7rem;
      color: #666;
    }
    
    .strength-val {
      font-weight: 600;
      color: #eee;
    }
    
    .strength-val .reps {
      font-weight: 400;
      color: #888;
      font-size: 0.75rem;
    }
    
    .strength-val.empty {
      color: #444;
    }
    
    .strength-delta {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      display: inline-block;
      min-width: 40px;
    }
    
    .strength-delta.up {
      color: #4ade80;
      background: rgba(74, 222, 128, 0.1);
    }
    
    .strength-delta.down {
      color: #f87171;
      background: rgba(248, 113, 113, 0.1);
    }
    
    .strength-delta.same {
      color: #888;
    }
    
    .e1rm-label {
      font-size: 0.68rem;
      color: #667eea;
      margin-top: 2px;
      font-weight: 500;
    }
    
    .e1rm-explainer {
      font-size: 0.72rem;
      color: #666;
      padding: 8px 10px 4px;
      text-align: center;
      font-style: italic;
    }
    
    .meal-wrapper {
      position: relative;
    }
    
    .edit-meal-btn {
      padding: 8px;
      cursor: pointer;
      opacity: 0.5;
      font-size: 0.9rem;
    }
    
    .edit-meal-btn:hover {
      opacity: 1;
    }
    
    .custom-meal {
      background: rgba(102, 126, 234, 0.1);
      border-left: 3px solid #667eea;
    }
    
    .custom-badge {
      font-size: 0.6rem;
      background: #667eea;
      color: white;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 6px;
      vertical-align: middle;
    }
    
    .custom-meal-editor {
      display: none;
      padding: 12px 15px;
      background: #0f3460;
      border-top: 1px solid #1a1a2e;
    }
    
    .custom-meal-editor.show {
      display: block;
    }
    
    .custom-meal-default {
      font-size: 0.75rem;
      color: #888;
      margin-bottom: 10px;
    }
    
    .custom-meal-editor input[type="text"] {
      width: 100%;
      padding: 10px;
      margin-bottom: 8px;
      border: 1px solid #444;
      border-radius: 6px;
      background: #1a1a2e;
      color: #eee;
      font-size: 0.95rem;
    }
    
    .custom-meal-inputs {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }
    
    .custom-meal-inputs input {
      flex: 1;
      padding: 10px;
      border: 1px solid #444;
      border-radius: 6px;
      background: #1a1a2e;
      color: #eee;
      font-size: 0.95rem;
    }
    
    .custom-meal-actions {
      display: flex;
      gap: 10px;
    }
    
    .custom-meal-actions button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      background: #667eea;
      color: white;
    }
    
    .custom-meal-actions button.secondary {
      background: #444;
      color: #ccc;
    }
    
    .history-section {
      margin-top: 20px;
    }
    
    .history-card {
      background: #16213e;
      border-radius: 12px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    
    .history-card-header {
      background: #0f3460;
      padding: 12px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }
    
    .history-card-header .week-date {
      font-weight: 600;
    }
    
    .history-card-header .week-weight {
      font-size: 0.9rem;
      color: #667eea;
    }
    
    .history-card-body {
      padding: 12px 15px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      text-align: center;
      font-size: 0.85rem;
    }
    
    .history-stat {
      padding: 8px;
      background: #1a1a2e;
      border-radius: 8px;
    }
    
    .history-stat .value {
      font-weight: bold;
      color: #667eea;
    }
    
    .history-stat.good .value {
      color: #4ade80;
    }
    
    .weight-chart {
      background: #16213e;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
    }
    
    .weight-chart-header {
      font-weight: 600;
      margin-bottom: 15px;
    }
    
    .weight-chart-row {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
      font-size: 0.85rem;
    }
    
    .weight-chart-day {
      width: 40px;
      font-weight: 600;
    }
    
    .weight-chart-bar-container {
      flex: 1;
      height: 24px;
      background: #1a1a2e;
      border-radius: 4px;
      margin: 0 10px;
      position: relative;
      overflow: hidden;
    }
    
    .weight-chart-bar {
      height: 100%;

    function toggleSleep(day) {
      if (!state.sleep[day]) {
        state.sleep[day] = 'done';
      } else if (state.sleep[day] === 'done') {
        state.sleep[day] = 'missed';
      } else {
        delete state.sleep[day];
      }
      saveState();
      render();
    }
    
    function updateNotes(day, value) {
      state.notes[day] = value;
      saveState();
    }
    
    function updateWeight(day, value) {
      if (value && !isNaN(value)) {
        state.weights[day] = parseFloat(value);
      } else {
        delete state.weights[day];
      }
      saveState();
      render();
    }
    
    function updateLiftWeight(id, value) {
      if (value && !isNaN(value)) {
        state.liftWeights[id] = parseFloat(value);
      } else {
        delete state.liftWeights[id];
      }
      saveState();
    }
    
    // Parse sets x reps from exercise name, e.g. "3x8 Incline Bench" => { sets: 3, reps: 8 }
    function parseSetReps(name) {
      const match = name.match(/(\d+)\s*x\s*(\d+)[\s-]/i);
      if (match) {
        return { sets: parseInt(match[1]), reps: parseInt(match[2]) };
      }
      // Also handle "3x8-10" format
      const rangeMatch = name.match(/(\d+)\s*x\s*(\d+)-(\d+)/i);
      if (rangeMatch) {
        return { sets: parseInt(rangeMatch[1]), reps: parseInt(rangeMatch[3]) }; // use upper end as target
      }
      return null;
    }
    
    function updateSetLog(exerciseId, setNum, field, value) {
      if (!state.setLogs[exerciseId]) {
        state.setLogs[exerciseId] = {};
      }
      if (!state.setLogs[exerciseId][setNum]) {
        state.setLogs[exerciseId][setNum] = {};
      }
      if (value && !isNaN(value)) {
        state.setLogs[exerciseId][setNum][field] = parseFloat(value);
      } else {
        delete state.setLogs[exerciseId][setNum][field];
        // Clean up empty set entries
        if (Object.keys(state.setLogs[exerciseId][setNum]).length === 0) {
          delete state.setLogs[exerciseId][setNum];
        }
        if (Object.keys(state.setLogs[exerciseId]).length === 0) {
          delete state.setLogs[exerciseId];
        }
      }
      saveState();
    }
    
    // Get the top set for an exercise from setLogs (highest weight, with its reps)
    function getTopSet(exerciseId, data) {
      const logs = data && data.setLogs ? data.setLogs[exerciseId] : (state.setLogs[exerciseId] || null);
      if (!logs) {
        // Fallback to legacy liftWeights
        const lw = data ? (data.liftWeights || {}) : state.liftWeights;
        if (lw[exerciseId]) return { weight: lw[exerciseId], reps: null };
        return null;
      }
      let topWeight = 0, topReps = null;
      Object.values(logs).forEach(set => {
        if (set.weight && set.weight > topWeight) {
          topWeight = set.weight;
          topReps = set.reps || null;
        }
      });
      return topWeight > 0 ? { weight: topWeight, reps: topReps } : null;
    }
    
    function toggleCustomMeal(id) {

    function saveCustomMeal(id, defaultName) {
      const nameEl = document.getElementById('custom-name-' + id);
      const calEl = document.getElementById('custom-cal-' + id);
      const proteinEl = document.getElementById('custom-protein-' + id);
      
      const name = nameEl.value.trim();
      const cal = parseInt(calEl.value) || 0;
      const protein = parseInt(proteinEl.value) || 0;
      
      if (name && cal > 0) {
        state.customMeals[id] = { name, cal, protein };
        state.items[id] = 'done'; // auto-check it
      }

    function clearCustomMeal(id) {

      delete state.items[id];

    function toggleIngredient(ingId) {
      if (state.ingredientExclusions[ingId]) {
        delete state.ingredientExclusions[ingId];
      } else {
        state.ingredientExclusions[ingId] = true;
      }
      saveState();

    function toggleIngredientList(mealId) {
      const el = document.getElementById('ingredients-' + mealId);
      if (el) {
        el.classList.toggle('expanded');
        const btn = document.getElementById('ing-btn-' + mealId);

            btn.textContent.replace('▸', '▾') : 
            btn.textContent.replace('▾', '▸');
        }
      }
    }
    
    function getMealActiveTotals(meal) {
      if (!meal.ingredients || meal.ingredients.length === 0) {
        return { cal: meal.cal, protein: meal.protein };
      }
      let cal = 0, protein = 0;
      meal.ingredients.forEach(ing => {
        if (!state.ingredientExclusions[ing.id]) {
          const mult = state.ingredientMultipliers[ing.id] || 1;
          cal += Math.round(ing.cal * mult);
          protein += Math.round(ing.protein * mult);
        }
      });
      return { cal, protein };
    }
    
    function updateIngredientMultiplier(ingId, value) {
      const mult = parseFloat(value);
      if (!isNaN(mult) && mult > 0) {
        if (mult === 1) {
          delete state.ingredientMultipliers[ingId];
        } else {
          state.ingredientMultipliers[ingId] = mult;
        }
      } else if (value === '') {
        delete state.ingredientMultipliers[ingId];
      }
      saveState();
      render();
    }

      const monday = new Date(date.getFullYear(), date.getMonth(), diff, 12, 0, 0);

      state.weekStart = `${year}-${month}-${d}`;

    function downloadJSON(data, filename) {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }
    
    function exportCurrentWeek() {
      const key = 'fitnessTracker_' + state.weekStart;
      const data = localStorage.getItem(key);
      if (!data) {
        alert('No data saved for this week yet.');
        return;
      }
      const weekData = { weekStart: state.weekStart, ...JSON.parse(data) };
      const dateStr = state.weekStart;
      downloadJSON(weekData, `fitness_week_${dateStr}.json`);
    }
    
    function exportAllWeeks() {
      const allData = getAllWeekData();
      if (allData.length === 0) {
        alert('No data saved yet.');
        return;
      }
      const today = new Date().toISOString().slice(0, 10);
      downloadJSON({ exportDate: today, weekCount: allData.length, weeks: allData }, `fitness_all_weeks_${today}.json`);
    }
    
    function getAllWeekData() {
      const allData = [];
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key && key.startsWith('fitnessTracker_')) {
          const weekStart = key.replace('fitnessTracker_', '');
          const data = JSON.parse(localStorage.getItem(key));
          allData.push({ weekStart, ...data });
        }
      }
      return allData.sort((a, b) => new Date(b.weekStart) - new Date(a.weekStart));
    }
    
    function getWeekSummaryData(weekStart, data) {
      let totalMealsHit = 0, totalMeals = 0;
      let totalWorkoutsHit = 0, totalWorkouts = 0;
      let totalCardioHit = 0, totalCardio = 0;
      let totalSleepHit = 0;
      
      days.forEach(dayKey => {
        const day = weekData[dayKey];
        const mealGroupsCounted = new Set();
        const mealGroupsHit = new Set();
        const workoutGroupsCounted = new Set();
        const workoutGroupsHit = new Set();
        
        // Count meals
        day.meals.forEach(meal => {
          if (meal.group) {
            if (!mealGroupsCounted.has(meal.group)) {
              mealGroupsCounted.add(meal.group);
              totalMeals++;
            }
          } else {
            totalMeals++;
          }
          
          if (data.items && data.items[meal.id] === 'done') {
            if (meal.group) {
              if (!mealGroupsHit.has(meal.group)) {
                mealGroupsHit.add(meal.group);
                totalMealsHit++;
              }
            } else {
              totalMealsHit++;
            }
          }
        });
        
        // Count workouts
        day.workouts.forEach(w => {
          if (w.group) {
            if (!workoutGroupsCounted.has(w.group)) {
              workoutGroupsCounted.add(w.group);
              totalWorkouts++;
            }
          } else {
            totalWorkouts++;
          }
          
          if (data.items && data.items[w.id] === 'done') {
            if (w.group) {
              if (!workoutGroupsHit.has(w.group)) {
                workoutGroupsHit.add(w.group);
                totalWorkoutsHit++;
              }
            } else {
              totalWorkoutsHit++;
            }
          }
        });
        
        if (day.cardioSession) {
          totalCardio++;
          if (Array.isArray(day.cardioSession)) {
            if (day.cardioSession.some(c => data.items && data.items[c.id] === 'done')) totalCardioHit++;
          } else {
            if (data.items && data.items[day.cardioSession.id] === 'done') totalCardioHit++;
          }
        }
        if (data.sleep && data.sleep[dayKey] === 'done') totalSleepHit++;
      });
      
      const weights = data.weights || {};
      const weightValues = Object.values(weights).filter(w => w);
      const avgWeight = weightValues.length > 0 ? (weightValues.reduce((a,b) => a+b, 0) / weightValues.length).toFixed(1) : null;
      const startWeight = weights.monday || weights.tuesday || weights.wednesday;
      const endWeight = weights.sunday || weights.saturday || weights.friday;
      const weightChange = (startWeight && endWeight) ? (endWeight - startWeight).toFixed(1) : null;
      
      return { totalMealsHit, totalMeals, totalWorkoutsHit, totalWorkouts, totalCardioHit, totalCardio, totalSleepHit, avgWeight, weightChange };
    }
    
    function getDayStats(dayKey) {
      const day = weekData[dayKey];
      const meals = getMealsForDay(dayKey);
      const targets = getAdjustedTargets(dayKey);
      let mealsHit = 0, mealsMissed = 0;
      let calConsumed = 0, proteinConsumed = 0;
      let workoutsHit = 0, workoutsMissed = 0;
      
      // Track which groups we've already counted for meals
      const mealGroupsCounted = new Set();
      let mealsTotal = 0;
      
      meals.forEach(meal => {
        if (meal.group) {
          if (!mealGroupsCounted.has(meal.group)) {
            mealGroupsCounted.add(meal.group);
            mealsTotal++;
          }
        } else {
          mealsTotal++;
        }
        
        if (state.items[meal.id] === 'done') {
          // Use custom meal values if they exist, otherwise use ingredient-based totals
          const custom = state.customMeals[meal.id];
          if (custom) {
            calConsumed += custom.cal;
            proteinConsumed += custom.protein;
          } else if (meal.isFlex) {
            // Flex meal: use flex meal saved values or defaults
            const flexVals = getFlexMealValues(meal.id);
            calConsumed += flexVals.cal;
            proteinConsumed += flexVals.protein;
          } else {
            const totals = getMealActiveTotals(meal);
            calConsumed += totals.cal;
            proteinConsumed += totals.protein;
          }
        }
      });
      
      // Recalculate mealsHit properly for groups
      const mealGroupsHit = new Set();
      meals.forEach(meal => {
        if (state.items[meal.id] === 'done') {
          if (meal.group) {
            if (!mealGroupsHit.has(meal.group)) {
              mealGroupsHit.add(meal.group);
              mealsHit++;
            }
          } else {
            mealsHit++;
          }
        }
      });
      
      // Track which groups we've already counted for workouts
      const workoutGroupsCounted = new Set();
      let workoutsTotal = 0;
      
      day.workouts.forEach(w => {
        if (w.group) {
          if (!workoutGroupsCounted.has(w.group)) {
            workoutGroupsCounted.add(w.group);
            workoutsTotal++;
          }
        } else {
          workoutsTotal++;
        }
      });
      
      // Recalculate workoutsHit properly for groups
      const workoutGroupsHit = new Set();
      day.workouts.forEach(w => {
        if (state.items[w.id] === 'done') {
          if (w.group) {
            if (!workoutGroupsHit.has(w.group)) {
              workoutGroupsHit.add(w.group);
              workoutsHit++;
            }
          } else {
            workoutsHit++;
          }
        }
      });
      
      // Check if cardio was done (handles both single and array cardio)
      let cardioHit = false;
      if (day.cardioSession) {
        if (Array.isArray(day.cardioSession)) {
          cardioHit = day.cardioSession.some(c => state.items[c.id] === 'done');
        } else {
          cardioHit = state.items[day.cardioSession.id] === 'done';
        }
      }
      
      return { mealsHit, mealsMissed, mealsTotal, workoutsHit, workoutsMissed, workoutsTotal, calConsumed, proteinConsumed, cardioHit, targetCal: targets.targetCal, targetProtein: targets.targetProtein };
    }
    
    function getWeeklyStats() {
      let totalMealsHit = 0, totalMeals = 0;
      let totalWorkoutsHit = 0, totalWorkouts = 0;
      let totalCardioHit = 0, totalCardio = 0;
      let totalSleepHit = 0;
      
      days.forEach(dayKey => {
        const stats = getDayStats(dayKey);
        totalMealsHit += stats.mealsHit;
        totalMeals += stats.mealsTotal;
        totalWorkoutsHit += stats.workoutsHit;
        totalWorkouts += stats.workoutsTotal;
        if (weekData[dayKey].cardioSession) {
          totalCardio++;
          if (stats.cardioHit) totalCardioHit++;
        }
        if (state.sleep[dayKey] === 'done') totalSleepHit++;
      });
      
      return { totalMealsHit, totalMeals, totalWorkoutsHit, totalWorkouts, totalCardioHit, totalCardio, totalSleepHit };
    }
    
    function renderToggle(id, group = null, size = 36) {
      const status = state.items[id];
      let className = 'item-toggle';
      let content = '';

        className += ' done';
        content = '✓';
      } else if (status === 'missed') {
        className += ' missed';
        content = '✗';
      }
      const groupParam = group ? `'${group}'` : 'null';
      return `<div class="${className}" style="width:${size}px;height:${size}px" onclick="toggleItem('${id}', ${groupParam})">${content}</div>`;
    }

                      onclick="event.stopPropagation()">
                    <input type="number" step="1" placeholder="${setReps.reps}" 
                      value="${setData.reps || ''}"

    function getStrengthProgress() {
      const allWeeks = getAllWeekData().reverse(); // oldest first
      const exercises = {};
      
      // Define which exercises to track (key lifts) - updated list
      const keyLifts = [
        { id: 'mon-w2', name: 'Incline Press', day: 'Mon' },
        { id: 'tue-w2', name: 'Hack Squat', day: 'Tue' },
        { id: 'tue-w3', name: 'Leg Curl', day: 'Tue' },
        { id: 'fri-w2', name: 'RDL', day: 'Fri' },
        { id: 'mon-w3', name: 'Lat Pulldown', day: 'Mon' },
        { id: 'thu-w6', name: 'Assisted Dips', day: 'Thu' },
        { id: 'tue-w7', name: 'Decline Crunch', day: 'Tue', bodyweight: true },
        { id: 'mon-w7', name: 'Preacher Curls', day: 'Mon' }
      ];
      
      keyLifts.forEach(lift => {
        exercises[lift.id] = {
          name: lift.name,
          day: lift.day,
          bodyweight: lift.bodyweight || false,
          data: []
        };
        
        allWeeks.forEach(week => {
          // Try setLogs first, then fallback to liftWeights
          const topSet = getTopSet(lift.id, week);
          if (topSet) {
            exercises[lift.id].data.push({
              week: week.weekStart,
              weight: topSet.weight,
              reps: topSet.reps
            });
          }
        });
      });
      
      return exercises;
    }
    
    function renderStrengthProgress() {
      const progress = getStrengthProgress();
      const currentWeekStart = state.weekStart;
      
      // Epley formula: e1RM = weight × (1 + reps/30)
      function calcE1RM(weight, reps) {
        if (!weight || !reps) return null;
        if (reps === 1) return weight;
        return Math.round(weight * (1 + reps / 30));
      }
      
      function getWeekOffset(offset) {
        const d = new Date(currentWeekStart + 'T12:00:00');
        d.setDate(d.getDate() - (offset * 7));
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        return `${y}-${m}-${dd}`;
      }
      
      const thisWeekKey = currentWeekStart;
      const lastWeekKey = getWeekOffset(1);
      const twoWeeksKey = getWeekOffset(2);
      
      function weekLabel(weekStart) {
        const d = new Date(weekStart + 'T12:00:00');
        return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      }
      
      const keyLifts = Object.entries(progress);
      const hasAnyData = keyLifts.some(([id, ex]) => ex.data.length > 0);
      
      if (!hasAnyData) {
        return `<div style="padding:20px;text-align:center;color:#888;">
          Start logging your sets to see strength progress here!
        </div>`;
      }
      
      function getWeekData(exerciseData, weekKey) {
        return exerciseData.find(d => d.week === weekKey) || null;
      }
      
      // Format: "185 × 8" on first line, "e1RM: 234" on second line
      function formatCell(data, bodyweight) {
        if (!data) return `<span class="strength-val empty">—</span>`;
        if (bodyweight) {
          return `<span class="strength-val">${data.reps || '—'} <span class="reps">reps</span></span>`;
        }
        const repsStr = data.reps ? ` <span class="reps">× ${data.reps}</span>` : '';
        const e1rm = calcE1RM(data.weight, data.reps);
        const e1rmLine = e1rm ? `<div class="e1rm-label">e1RM: ${e1rm}</div>` : '';
        return `<span class="strength-val">${data.weight}${repsStr}</span>${e1rmLine}`;
      }
      
      // Delta is now based on e1RM for weighted lifts
      function formatDelta(current, previous, bodyweight) {
        if (!current || !previous) return '';
        if (bodyweight) {
          if (!current.reps || !previous.reps) return '';
          const diff = current.reps - previous.reps;
          if (diff === 0) return `<span class="strength-delta same">—</span>`;
          const cls = diff > 0 ? 'up' : 'down';
          return `<span class="strength-delta ${cls}">${diff > 0 ? '+' : ''}${diff} reps</span>`;
        }
        const curE1RM = calcE1RM(current.weight, current.reps);
        const prevE1RM = calcE1RM(previous.weight, previous.reps);
        // If we have e1RM for both, use that; otherwise fall back to raw weight
        if (curE1RM && prevE1RM) {
          const diff = curE1RM - prevE1RM;
          if (diff === 0) return `<span class="strength-delta same">—</span>`;
          const cls = diff > 0 ? 'up' : 'down';
          return `<span class="strength-delta ${cls}">${diff > 0 ? '+' : ''}${diff} lbs</span>`;
        }
        const diff = current.weight - previous.weight;
        if (diff === 0) return `<span class="strength-delta same">—</span>`;
        const cls = diff > 0 ? 'up' : 'down';
        return `<span class="strength-delta ${cls}">${diff > 0 ? '+' : ''}${diff} lbs</span>`;
      }
      
      let rows = keyLifts.map(([id, exercise]) => {
        const thisWeek = getWeekData(exercise.data, thisWeekKey);
        const lastWeek = getWeekData(exercise.data, lastWeekKey);
        const twoWeeksAgo = getWeekData(exercise.data, twoWeeksKey);
        
        const deltaVsLast = formatDelta(thisWeek, lastWeek, exercise.bodyweight);
        const deltaVs2Weeks = formatDelta(thisWeek, twoWeeksAgo, exercise.bodyweight);
        
        return `
          <tr>
            <td>
              <div class="strength-lift-name">${exercise.name}</div>
              <div class="strength-lift-day">${exercise.day}</div>
            </td>
            <td>${formatCell(twoWeeksAgo, exercise.bodyweight)}</td>
            <td>${formatCell(lastWeek, exercise.bodyweight)}</td>
            <td>${formatCell(thisWeek, exercise.bodyweight)}</td>
            <td>${deltaVsLast || deltaVs2Weeks ? `
              <div>${deltaVsLast || ''}</div>
              ${deltaVs2Weeks && deltaVsLast ? `<div style="margin-top:3px;">${deltaVs2Weeks}</div>` : ''}
            ` : `<span class="strength-delta same">—</span>`}</td>
          </tr>
        `;
      }).join('');
      
      return `
        <div class="e1rm-explainer">Change is based on estimated 1RM (Epley formula) so rep gains count too</div>
        <table class="strength-table">
          <thead>
            <tr>
              <th>Lift</th>
              <th>${weekLabel(twoWeeksKey)}</th>
              <th>${weekLabel(lastWeekKey)}</th>
              <th>This Week</th>
              <th>Δ vs Last</th>
            </tr>
          </thead>
          <tbody>
            ${rows}
          </tbody>
        </table>
      `;
    }
    
    function getWeightLossData() {
      const allWeeks = getAllWeekData().reverse(); // oldest first
      const weightData = [];
      
      allWeeks.slice(-8).forEach(week => {
        const weights = week.weights || {};
        // Get all daily weights for this week
        days.forEach((dayKey, idx) => {
          if (weights[dayKey]) {
            const weekDate = new Date(week.weekStart + 'T12:00:00');
            weekDate.setDate(weekDate.getDate() + idx);
            weightData.push({
              date: weekDate,
              weight: weights[dayKey],
              label: weekDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
            });
          }
        });
      });
      
      return weightData;
    }
    
    function renderWeightLossChart() {
      const data = getWeightLossData();
      
      if (data.length < 2) {
        return `<div style="padding:20px;text-align:center;color:#888;">
          Need at least 2 weigh-ins to show progress chart
        </div>`;
      }
      
      const weights = data.map(d => d.weight);
      const minWeight = Math.min(...weights) - 2;
      const maxWeight = Math.max(...weights) + 2;
      const range = maxWeight - minWeight;
      
      const width = 320;
      const height = 180;
      const padding = { top: 20, right: 20, bottom: 40, left: 45 };
      const chartWidth = width - padding.left - padding.right;
      const chartHeight = height - padding.top - padding.bottom;
      
      // Create points for the line
      const points = data.map((d, i) => {
        const x = padding.left + (i / (data.length - 1)) * chartWidth;
        const y = padding.top + chartHeight - ((d.weight - minWeight) / range) * chartHeight;
        return { x, y, ...d };
      });
      
      // Create SVG path
      const linePath = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ');
      
      // Create area fill path
      const areaPath = linePath + ` L ${points[points.length-1].x} ${padding.top + chartHeight} L ${points[0].x} ${padding.top + chartHeight} Z`;
      
      // Y-axis labels (5 ticks)
      const yTicks = [];
      for (let i = 0; i <= 4; i++) {
        const val = minWeight + (range * i / 4);
        const y = padding.top + chartHeight - (i / 4) * chartHeight;
        yTicks.push(`<text x="${padding.left - 8}" y="${y + 4}" text-anchor="end" fill="#888" font-size="10">${Math.round(val)}</text>`);
        yTicks.push(`<line x1="${padding.left}" y1="${y}" x2="${width - padding.right}" y2="${y}" stroke="#333" stroke-dasharray="3,3"/>`);
      }
      
      // X-axis labels (show ~5 dates)
      const xLabels = [];
      const step = Math.max(1, Math.floor(data.length / 5));
      for (let i = 0; i < data.length; i += step) {
        const p = points[i];
        xLabels.push(`<text x="${p.x}" y="${height - 10}" text-anchor="middle" fill="#888" font-size="9">${p.label}</text>`);
      }
      // Always show last date
      if ((data.length - 1) % step !== 0) {
        const p = points[points.length - 1];
        xLabels.push(`<text x="${p.x}" y="${height - 10}" text-anchor="middle" fill="#888" font-size="9">${p.label}</text>`);
      }
      
      // Calculate total change
      const firstWeight = data[0].weight;
      const lastWeight = data[data.length - 1].weight;
      const totalChange = (lastWeight - firstWeight).toFixed(1);
      const changeColor = totalChange < 0 ? '#4ade80' : totalChange > 0 ? '#f87171' : '#888';
      const changeText = totalChange > 0 ? `+${totalChange}` : totalChange;
      
      return `
        <div class="weight-loss-header">
          <span>Start: ${firstWeight} lbs</span>
          <span>Current: ${lastWeight} lbs</span>
          <span style="color:${changeColor};font-weight:600">${changeText} lbs</span>
        </div>
        <svg width="100%" viewBox="0 0 ${width} ${height}" class="weight-loss-svg">
          <!-- Grid lines -->
          ${yTicks.join('')}
          
          <!-- Area fill -->
          <path d="${areaPath}" fill="url(#weightGradient)" opacity="0.3"/>
          
          <!-- Line -->
          <path d="${linePath}" fill="none" stroke="#667eea" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          
          <!-- Data points -->
          ${points.map(p => `<circle cx="${p.x}" cy="${p.y}" r="4" fill="#667eea" stroke="#1a1a2e" stroke-width="2"/>`).join('')}
          
          <!-- X labels -->
          ${xLabels.join('')}
          
          <!-- Gradient definition -->
          <defs>
            <linearGradient id="weightGradient" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="#667eea"/>
              <stop offset="100%" stop-color="#1a1a2e"/>
            </linearGradient>
          </defs>
        </svg>
      `;
    }

                      <div class="value">${summary.totalWorkoutsHit}/${summary.totalWorkouts}</div>
                      <div>Workouts</div>

                      <div class="value">${summary.totalCardioHit}/${summary.totalCardio}</div>
                      <div>Cardio</div>

                    <div class="history-stat ${summary.totalSleepHit >= 6 ? 'good' : ''}">
                      <div class="value">${summary.totalSleepHit}/7</div>
                      <div>Sleep</div>
                    </div>

          </div>
        `;

      return `

          <div class="weight-chart">
            <div class="weight-chart-header">⚖️ This Week's Weight ${weeklyChangeDisplay !== '-' ? '(' + weeklyChangeDisplay + ')' : ''}</div>

    function render() {
      const weekStartDate = new Date(state.weekStart + 'T12:00:00');
      const weekEnd = new Date(state.weekStart + 'T12:00:00');
      weekEnd.setDate(weekEnd.getDate() + 6);
      const weekLabel = `${weekStartDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })} - ${weekEnd.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}`;
      
      const tabs = days.map(dayKey => {
        const stats = getDayStats(dayKey);
        const pct = stats.mealsTotal > 0 ? Math.round((stats.mealsHit / stats.mealsTotal) * 100) : 0;
        return `
          <div class="tab ${state.currentTab === dayKey ? 'active' : ''}" onclick="state.currentTab='${dayKey}';render()">

            <div class="day-status">${pct}%</div>
